<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拾光笔记</title>
  <style>
    :root {
      --bg: #f3f1ec;
      --panel: rgba(255, 255, 255, 0.72);
      --paper: #fffdf8;
      --text: #272521;
      --muted: #8a857b;
      --line: #e7e2d8;
      --accent: #cf6f4f;
      --accent-soft: #f5e3da;
      --shadow: 0 18px 50px rgba(62, 49, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 760px;
      height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at 8% 12%, #f8d9c9 0, transparent 25%),
        radial-gradient(circle at 90% 88%, #dce7dd 0, transparent 28%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      width: calc(100% - 48px);
      height: calc(100vh - 48px);
      margin: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 28px 20px 20px;
      border-right: 1px solid var(--line);
      background: rgba(250, 248, 243, 0.76);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-family: Georgia, "Songti SC", serif;
      font-size: 23px;
      letter-spacing: 2px;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 11px;
      color: white;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(207, 111, 79, 0.25);
    }

    .new-note {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      color: white;
      font-size: 26px;
      line-height: 1;
      background: var(--text);
      transition: transform 0.2s, background 0.2s;
    }

    .new-note:hover {
      transform: translateY(-2px);
      background: var(--accent);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 26px 4px 16px;
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.82);
      transition: border-color 0.2s;
    }

    .search:focus-within {
      border-color: #d8a28d;
    }

    .search svg {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
    }

    .search input::placeholder {
      color: #aaa49a;
    }

    .list-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 10px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .note-count {
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0;
      background: var(--accent-soft);
    }

    .note-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .note-list::-webkit-scrollbar {
      width: 5px;
    }

    .note-list::-webkit-scrollbar-thumb {
      border-radius: 10px;
      background: #d8d1c6;
    }

    .note-card {
      width: 100%;
      margin-bottom: 7px;
      padding: 15px 16px;
      border: 1px solid transparent;
      border-radius: 15px;
      text-align: left;
      color: inherit;
      background: transparent;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .note-card:hover {
      transform: translateX(2px);
      background: rgba(255, 255, 255, 0.62);
    }

    .note-card.active {
      border-color: #efd4c8;
      background: var(--accent-soft);
    }

    .note-card h3 {
      overflow: hidden;
      margin: 0 0 7px;
      font-size: 15px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-preview {
      overflow: hidden;
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-time {
      color: #aaa399;
      font-size: 11px;
    }

    .editor {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 28px 44px 36px;
      background: rgba(255, 253, 248, 0.82);
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 13px;
    }

    .save-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #73a47f;
    }

    .delete-note {
      padding: 8px 13px;
      border-radius: 10px;
      color: #9b6a5c;
      background: transparent;
      transition: background 0.2s;
    }

    .delete-note:hover {
      background: #f7e3df;
    }

    .title-input {
      width: 100%;
      margin-bottom: 14px;
      border: 0;
      outline: 0;
      color: var(--text);
      font-family: Georgia, "Songti SC", serif;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: 1px;
      background: transparent;
    }

    .title-input::placeholder,
    .content-input::placeholder {
      color: #c4beb4;
    }

    .meta {
      display: flex;
      gap: 18px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .content-input {
      flex: 1;
      width: 100%;
      margin-top: 28px;
      padding: 0;
      resize: none;
      border: 0;
      outline: 0;
      color: #46413a;
      font-family: Georgia, "Songti SC", serif;
      font-size: 18px;
      line-height: 1.9;
      background: transparent;
    }

    .empty-state {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-family: Georgia, "Songti SC", serif;
      font-size: 24px;
    }

    @media (max-width: 900px) {
      body {
        min-width: 640px;
      }

      .app {
        grid-template-columns: 275px 1fr;
        width: calc(100% - 24px);
        height: calc(100vh - 24px);
        margin: 12px;
      }

      .editor {
        padding-right: 28px;
        padding-left: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand-row">
        <h1 class="brand"><span class="brand-mark">拾</span>拾光笔记</h1>
        <button class="new-note" id="newNote" title="新建笔记" aria-label="新建笔记">+</button>
      </div>

      <label class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
        <input id="searchInput" type="search" placeholder="搜索笔记...">
      </label>

      <div class="list-label">
        <span id="listLabelText">全部笔记</span>
        <span class="note-count" id="noteCount">共 0 篇</span>
      </div>
      <div class="note-list" id="noteList"></div>
    </aside>

    <section class="editor">
      <div id="editorArea" style="display: flex; flex: 1; min-height: 0; flex-direction: column;">
        <div class="editor-toolbar">
          <span class="save-status"><span class="save-dot"></span><span id="saveStatus">已自动保存</span></span>
          <button class="delete-note" id="deleteNote">删除笔记</button>
        </div>
        <input class="title-input" id="titleInput" type="text" placeholder="笔记标题">
        <div class="meta">
          <span id="dateText"></span>
          <span id="wordCount">0 字</span>
        </div>
        <textarea class="content-input" id="contentInput" placeholder="从这里开始记录你的想法..."></textarea>
      </div>

      <div class="empty-state" id="emptyState">
        <div><strong>这里很安静</strong>新建一篇笔记，记录此刻的想法。</div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "shiguang-notes";
    const ACTIVE_KEY = "shiguang-active-note";
    const DATA_VERSION_KEY = "shiguang-notes-version";
    const DATA_VERSION = 3;
    const RETIRED_SAMPLE_TITLES = new Set([
      "旅行清单",
      "会议记录",
      "想看的电影",
      "生活备忘"
    ]);

    const defaultNotes = [
      {
        id: crypto.randomUUID(),
        title: "欢迎使用拾光笔记",
        content: "在左侧选择一篇笔记，在右侧自由书写。\n\n你的内容会自动保存在浏览器中，即使关闭页面也不会丢失。",
        updatedAt: Date.now()
      },
      {
        id: crypto.randomUUID(),
        title: "今日灵感",
        content: "好的想法往往来得很轻，记得及时把它留下来。",
        updatedAt: Date.now() - 86400000
      },
      {
        id: crypto.randomUUID(),
        title: "本周计划",
        content: "1. 整理工作清单\n2. 完成阅读计划\n3. 周末去公园散步\n4. 给家人打个电话",
        updatedAt: Date.now() - 2 * 86400000
      },
      {
        id: crypto.randomUUID(),
        title: "阅读摘录",
        content: "阅读不是为了记住所有内容，而是让一些思想在心里停留得更久。",
        updatedAt: Date.now() - 3 * 86400000
      }
    ];

    let notes = loadNotes();
    let activeId = localStorage.getItem(ACTIVE_KEY) || notes[0]?.id || null;
    let searchTerm = "";
    let saveTimer;

    const noteList = document.getElementById("noteList");
    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");
    const dateText = document.getElementById("dateText");
    const wordCount = document.getElementById("wordCount");
    const saveStatus = document.getElementById("saveStatus");
    const editorArea = document.getElementById("editorArea");
    const emptyState = document.getElementById("emptyState");
    const listLabelText = document.getElementById("listLabelText");
    const noteCount = document.getElementById("noteCount");

    function loadNotes() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(saved)) {
          localStorage.setItem(DATA_VERSION_KEY, DATA_VERSION);
          return defaultNotes;
        }

        const currentVersion = Number(localStorage.getItem(DATA_VERSION_KEY) || 1);
        if (currentVersion < DATA_VERSION) {
          const retainedNotes = saved.filter(note => !RETIRED_SAMPLE_TITLES.has(note.title));
          const existingTitles = new Set(retainedNotes.map(note => note.title));
          const newSamples = defaultNotes.filter(note => !existingTitles.has(note.title));
          const upgradedNotes = [...retainedNotes, ...newSamples];
          localStorage.setItem(STORAGE_KEY, JSON.stringify(upgradedNotes));
          localStorage.setItem(DATA_VERSION_KEY, DATA_VERSION);
          return upgradedNotes;
        }

        return saved;
      } catch {
        return defaultNotes;
      }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      localStorage.setItem(ACTIVE_KEY, activeId || "");
      saveStatus.textContent = "已自动保存";
    }

    function formatDate(timestamp) {
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(timestamp);
    }

    function relativeDate(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return "刚刚";
      if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;
      return new Intl.DateTimeFormat("zh-CN", { month: "short", day: "numeric" }).format(timestamp);
    }

    function renderList() {
      const filtered = notes
        .filter(note => `${note.title} ${note.content}`.toLowerCase().includes(searchTerm))
        .sort((a, b) => b.updatedAt - a.updatedAt);

      listLabelText.textContent = searchTerm ? "搜索结果" : "全部笔记";
      noteCount.textContent = searchTerm
        ? `找到 ${filtered.length} 篇`
        : `共 ${notes.length} 篇`;
      noteList.innerHTML = "";

      filtered.forEach(note => {
        const card = document.createElement("button");
        card.className = `note-card${note.id === activeId ? " active" : ""}`;
        card.innerHTML = `
          <h3>${escapeHtml(note.title || "无标题笔记")}</h3>
          <p class="note-preview">${escapeHtml(note.content.replace(/\n/g, " ") || "暂无内容")}</p>
          <span class="note-time">${relativeDate(note.updatedAt)}</span>
        `;
        card.addEventListener("click", () => {
          activeId = note.id;
          localStorage.setItem(ACTIVE_KEY, activeId);
          render();
        });
        noteList.appendChild(card);
      });
    }

    function renderEditor() {
      const note = notes.find(item => item.id === activeId);
      const hasNote = Boolean(note);
      editorArea.style.display = hasNote ? "flex" : "none";
      emptyState.style.display = hasNote ? "none" : "flex";

      if (!note) return;
      titleInput.value = note.title;
      contentInput.value = note.content;
      dateText.textContent = `最后编辑于 ${formatDate(note.updatedAt)}`;
      updateWordCount();
    }

    function render() {
      if (activeId && !notes.some(note => note.id === activeId)) {
        activeId = notes[0]?.id || null;
      }
      renderList();
      renderEditor();
    }

    function updateActiveNote() {
      const note = notes.find(item => item.id === activeId);
      if (!note) return;

      note.title = titleInput.value;
      note.content = contentInput.value;
      note.updatedAt = Date.now();
      dateText.textContent = `最后编辑于 ${formatDate(note.updatedAt)}`;
      updateWordCount();
      renderList();

      saveStatus.textContent = "正在保存...";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNotes, 350);
    }

    function updateWordCount() {
      const count = contentInput.value.replace(/\s/g, "").length;
      wordCount.textContent = `${count} 字`;
    }

    function createNote() {
      const note = {
        id: crypto.randomUUID(),
        title: "",
        content: "",
        updatedAt: Date.now()
      };
      notes.unshift(note);
      activeId = note.id;
      searchTerm = "";
      document.getElementById("searchInput").value = "";
      saveNotes();
      render();
      titleInput.focus();
    }

    function deleteActiveNote() {
      const note = notes.find(item => item.id === activeId);
      if (!note || !confirm(`确定删除“${note.title || "无标题笔记"}”吗？`)) return;

      notes = notes.filter(item => item.id !== activeId);
      activeId = notes[0]?.id || null;
      saveNotes();
      render();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById("newNote").addEventListener("click", createNote);
    document.getElementById("deleteNote").addEventListener("click", deleteActiveNote);
    document.getElementById("searchInput").addEventListener("input", event => {
      searchTerm = event.target.value.trim().toLowerCase();
      renderList();
    });
    titleInput.addEventListener("input", updateActiveNote);
    contentInput.addEventListener("input", updateActiveNote);

    render();
  </script>
</body>
</html>
